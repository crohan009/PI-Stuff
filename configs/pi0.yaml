# π₀ — first generalist VLA (Oct 2024)
# Paper: papers/2024-10-31_pi0_first-generalist-policy.pdf
model:
  name: pi0
  backbone:
    name: paligemma
    hf_repo: google/paligemma-3b-pt-224
  state_dim: 14
  image_resolution: 224
  control_hz: 50
  action_expert:
    hidden_size: 1024
    num_layers: 16
    num_heads: 16
    action_dim: 14
    horizon: 50
    flow_steps: 5
    cross_attend_to_vlm: true

training:
  recipe: ki              # see configs/ki.yaml — KI is the canonical π₀ recipe
  batch_size: 64
  learning_rate: 2.0e-5
  warmup_steps: 1000
  total_steps: 200000
  precision: bf16
